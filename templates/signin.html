<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | CurricuForge</title>
    <meta name="description"
        content="Sign in to your CurricuForge account to access your saved curricula and AI tools.">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <style>
        .auth-container {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 2.5rem 2rem;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.75rem;
        }

        .auth-logo .icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .auth-logo .text {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-title {
            text-align: center;
            font-size: 1.375rem;
            font-weight: 700;
            color: var(--text-heading);
            margin-bottom: 0.25rem;
        }

        .auth-subtitle {
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 1.75rem;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.125rem;
        }

        .auth-form .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .auth-form .form-label {
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-heading);
        }

        .auth-form .form-control {
            padding: 0.7rem 1rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
            background: var(--bg-main);
            color: var(--text-body);
        }

        .auth-form .form-control:focus {
            border-color: var(--primary-start);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .auth-submit {
            margin-top: 0.5rem;
            padding: 0.75rem;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.9375rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.1s ease;
        }

        .auth-submit:hover {
            opacity: 0.9;
        }

        .auth-submit:active {
            transform: scale(0.98);
        }

        .auth-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .auth-error {
            padding: 0.625rem 0.875rem;
            background: #fef2f2;
            border: 1px solid #fee2e2;
            border-radius: 10px;
            color: #dc2626;
            font-size: 0.8125rem;
            font-weight: 500;
            display: none;
        }

        .auth-error.show {
            display: block;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.84rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary-start);
            font-weight: 600;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <div class="container">
            <div class="nav-inner">
                <a href="/" class="nav-logo">
                    <div class="nav-logo-icon">⚒</div>
                    <span class="nav-logo-text">CurricuForge</span>
                </a>
                <ul class="nav-links" id="navLinks">
                    <li><a href="/">Home</a></li>
                    <li><a href="/generate">Generate</a></li>
                    <li><a href="/about">About</a></li>
                    <li><a href="/contact">Contact</a></li>
                </ul>
                <div class="nav-actions">
                    <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌙</button>
                    <a href="/signup" class="btn btn-primary btn-sm nav-cta">Sign Up →</a>
                </div>
                <button class="hamburger" id="hamburger" aria-label="Menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="icon">⚒</div>
                <div class="text">CurricuForge</div>
            </div>

            <div class="auth-title">Welcome Back</div>
            <div class="auth-subtitle">Sign in to continue designing curricula</div>

            <div class="auth-error" id="authError"></div>

            <form class="auth-form" id="signinForm" novalidate>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input class="form-control" id="email" type="email" placeholder="you@example.com"
                        autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input class="form-control" id="password" type="password" placeholder="Enter your password"
                        autocomplete="current-password" required>
                </div>

                <button type="submit" class="auth-submit" id="submitBtn">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="/signup">Create one here</a>
            </div>
        </div>
    </div>

    <div id="notificationContainer" class="notification-container"></div>

    <script src="{{ url_for('static', path='js/main.js') }}"></script>
    <script src="{{ url_for('static', path='js/auth.js') }}"></script>
</body>

</html>
